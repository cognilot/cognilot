name: Cognilot CI — Monorepo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PNPM_VERSION: 9

jobs:
  setup:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  format:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - name: Prettier Check
        run: pnpm exec prettier --check .

  lint:
    name: Lint All Packages
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - name: Lint SDK
        run: pnpm --filter @cognilot/sdk lint
        if: always()
      - name: Lint Extension
        run: pnpm --filter @cognilot/extension lint
        if: always()
      - name: Lint Web
        run: pnpm --filter @cognilot/web lint
        if: always()
      - name: Lint API
        run: pnpm --filter @cognilot/api lint
        if: always()

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - name: Typecheck SDK
        run: pnpm --filter @cognilot/sdk exec tsc --noEmit
        if: always()
      - name: Typecheck API
        run: pnpm --filter @cognilot/api exec tsc --noEmit
        if: always()
      - name: Typecheck Web (Next.js)
        run: pnpm --filter @cognilot/web exec tsc --noEmit
        if: always()

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - name: Test SDK
        run: pnpm --filter @cognilot/sdk test
        if: always()
      - name: Test API
        run: pnpm --filter @cognilot/api test
        if: always()
      - name: Test Extension
        run: pnpm --filter @cognilot/extension test
        if: always()
      - name: Test Web
        run: pnpm --filter @cognilot/web test
        if: always()

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - name: Build SDK (required first — extension depends on it)
        run: pnpm --filter @cognilot/sdk build
      - name: Build Extension
        run: pnpm --filter @cognilot/extension build
      - name: Build Web (Next.js)
        run: pnpm --filter @cognilot/web build
        env:
          # Provide dummy env vars so Next.js build doesn't fail
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
